name: Daily NSE Stock Analysis

on:
  schedule:
    # Run at 9:30 AM IST (4:00 AM UTC) Monday-Friday
    # NSE market opens at 9:15 AM IST
    - cron: '0 4 * * 1-5'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run NSE Analysis
        run: |
          python NSE_Analysis.py
      
      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        with:
          name: nse-analysis-${{ github.run_number }}
          path: dump/NSE-ANALYSIS-*.csv
          retention-days: 90
      
      - name: Commit results to repo (optional)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dump/NSE-ANALYSIS-*.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily NSE analysis: $(date +'%Y-%m-%d')"
          git push
        continue-on-error: true