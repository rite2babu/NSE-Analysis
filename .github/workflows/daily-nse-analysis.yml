name: Daily NSE Stock Analysis

on:
  schedule:
    # Run at 9:30 AM IST (4:00 AM UTC) Monday-Friday
    # NSE market opens at 9:15 AM IST
    - cron: '0 4 * * 1-5'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install jupyter nbconvert
      
      - name: Run NSE Analysis Notebook
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: |
          jupyter nbconvert --to notebook --execute NSE_Analysis.ipynb --output NSE_Analysis_executed.ipynb
      
      - name: Upload executed notebook (optional)
        uses: actions/upload-artifact@v4
        with:
          name: nse-analysis-notebook-${{ github.run_number }}
          path: NSE_Analysis_executed.ipynb
          retention-days: 7
        continue-on-error: true