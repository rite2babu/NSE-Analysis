name: Daily NSE Stock Analysis

on:
  schedule:
    # Run at 9:30 AM IST (4:00 AM UTC) Monday-Friday
    # NSE market opens at 9:15 AM IST
    - cron: '0 4 * * 1-5'
    
    # Run at 12:00 PM IST (6:30 AM UTC) Monday-Friday
    # Mid-day market analysis
    - cron: '30 6 * * 1-5'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run NSE Analysis (Modular Python)
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: |
          python nse_analysis_modular.py
      
      # Note: Results are sent via email from the Python script